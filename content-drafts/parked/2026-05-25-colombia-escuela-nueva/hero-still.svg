<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 600"
     preserveAspectRatio="xMidYMid slice"
     role="img"
     aria-label="A single continuous calligraphic line in ink drawing a small rural schoolhouse — pitched roof, walls, door, two windows, flag — and a second line in sage tracing the mountains behind. One breath.">

  <title>The Still · Colombia — Escuela Nueva at fifty</title>
  <desc>One continuous calligraphic gesture in ink that lands at the lower-left footpath, rises into the small schoolhouse — walls, single pitched roof, flag rising from the apex — comes back to draw the door and windows, and flows out to the right. A second line, in sage, draws the mountains behind. No filled volumes; the lines are the image; the ground is paper-cream. The continuous line carries fifty years of practice within itself.</desc>

  <!-- Paper-cream ground. -->
  <rect x="0" y="0" width="1200" height="600" fill="#FAFAF7"/>

  <!--
    ============================================================
    SECONDARY GESTURE — sage (#7A8471). The mountains, drawn FIRST
    so the schoolhouse line sits in front. One continuous line,
    three peaks, calligraphic, breathing.
    ============================================================
  -->

  <g id="mountains-line"
     fill="none"
     stroke="#7A8471"
     stroke-linecap="round"
     stroke-linejoin="round">

    <path stroke-width="2.6" stroke-opacity="0.78" d="
      M 60 360
      C 110 348 156 326 200 296
      C 232 274 262 246 290 222
      C 312 204 332 196 350 208
      C 372 226 394 252 420 282
      C 444 308 466 326 488 332
      C 506 336 524 330 540 314
      C 568 290 596 264 628 240
      C 664 214 696 200 720 210
      C 744 220 766 246 794 280
      C 820 312 846 336 874 350
      C 902 364 928 368 952 366
      C 980 364 1010 356 1042 346
      C 1070 338 1098 332 1132 328
    "/>
    <path stroke-width="1.4" stroke-opacity="0.55" d="
      M 64 364
      C 112 352 158 330 202 300
      C 234 278 264 250 292 226
      C 314 208 334 200 352 212
      C 374 230 396 256 420 286
      C 444 312 466 328 488 334
    "/>
    <path stroke-width="0.7" stroke-opacity="0.38" d="
      M 68 368
      C 114 356 160 334 204 304
      C 236 282 264 254 292 230
    "/>

    <!-- a softer, fainter back ridge -->
    <path stroke-width="1.4" stroke-opacity="0.42" d="
      M 40 392
      C 100 368 162 340 222 312
      C 274 288 320 270 360 268
      C 396 266 430 282 470 304
      C 510 326 552 342 590 342
      C 628 342 668 322 718 296
      C 766 270 808 256 848 256
      C 890 256 930 270 980 290
      C 1030 310 1080 326 1140 336
    "/>
    <path stroke-width="0.6" stroke-opacity="0.28" d="
      M 44 396
      C 102 372 162 344 222 316
      C 274 292 318 274 358 272
    "/>
  </g>

  <!--
    ============================================================
    PRIMARY GESTURE — ink (#1A2B3C). The schoolhouse, the path,
    the flag. One continuous line, drawn from beginning to end.
    Path narrative:
      1. The pen lands at the lower-left (footpath).
      2. Rises into the left wall of the schoolhouse.
      3. Climbs up the pitched roof to the apex.
      4. From the apex, a flagpole rises with a small flag.
      5. Returns to the apex (the pen retraces — calligraphically
         possible in one motion), down the right slope, down the
         right wall, and out into the footpath to the right.
      6. A small "dip back" for the door and the two windows —
         drawn at a different stroke weight to read as the line
         curling back into itself.
    ============================================================
  -->

  <g id="schoolhouse-line"
     fill="none"
     stroke="#1A2B3C"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!--
      The MAIN OUTLINE: footpath in → left wall up → left roof up to
      apex → flagpole up → flag → return to apex → right roof down →
      right wall down → footpath out.
      Drawn as a single continuous bezier sequence.
    -->

    <path stroke-width="3.0" stroke-opacity="0.92" d="
      M 100 504
      C 180 502 270 500 340 500
      C 360 500 380 498 396 488
      C 412 478 422 462 422 442
      C 422 414 422 386 422 358
      C 422 348 426 340 434 334
      L 558 220
      C 568 210 580 206 590 206
      C 600 206 610 212 620 222
      L 624 226
      L 624 130
      C 624 124 628 120 634 120
      C 658 122 686 130 708 144
      C 720 152 728 160 728 168
      C 728 174 720 180 708 186
      C 686 196 658 202 634 202
      L 624 202
      L 624 226
      L 748 334
      C 756 340 760 348 760 358
      C 760 386 760 414 760 442
      C 760 462 770 478 786 488
      C 802 498 822 500 842 500
      C 912 500 1002 502 1108 504
    "/>

    <path stroke-width="1.8" stroke-opacity="0.78" d="
      M 102 506
      C 182 504 272 502 340 502
      C 360 502 378 500 394 490
      C 410 480 420 462 420 442
      C 420 414 420 386 420 358
      C 420 350 424 342 432 336
      L 558 222
      C 568 212 580 208 590 208
      C 600 208 610 214 620 224
      L 624 228
      L 624 132
    "/>

    <path stroke-width="0.9" stroke-opacity="0.55" d="
      M 106 508
      C 184 506 274 504 340 504
      C 358 504 376 502 392 492
    "/>

    <!--
      THE INTERIOR — the pen "dips" back inside to draw the door
      and the two windows. Drawn at a lighter weight so they read
      as the line returning into itself.
    -->

    <!-- THE DOOR — a tall arched rectangle with a small handle. -->
    <path stroke-width="2.6" stroke-opacity="0.85" d="
      M 552 496
      L 552 410
      C 552 396 556 388 568 384
      C 580 380 600 380 612 384
      C 624 388 628 396 628 410
      L 628 496
    "/>
    <path stroke-width="1.3" stroke-opacity="0.60" d="
      M 554 496
      L 554 412
      C 554 398 558 390 568 386
      C 580 382 600 382 612 386
      C 622 390 626 398 626 412
      L 626 496
    "/>
    <!-- handle -->
    <path stroke-width="1.6" stroke-opacity="0.75" d="
      M 612 452
      C 608 450 606 448 606 444
      C 606 442 608 440 612 440
      C 614 440 616 442 616 444
      C 616 448 614 450 612 452
      Z
    "/>

    <!-- LEFT WINDOW — 2x2 panes -->
    <path stroke-width="2.0" stroke-opacity="0.80" d="
      M 458 400
      L 458 446
      L 524 446
      L 524 400
      Z
      M 491 400 L 491 446
      M 458 423 L 524 423
    "/>
    <path stroke-width="1.0" stroke-opacity="0.55" d="
      M 460 402
      L 460 444
      L 522 444
      L 522 402 Z
    "/>

    <!-- RIGHT WINDOW — 2x2 panes -->
    <path stroke-width="2.0" stroke-opacity="0.80" d="
      M 656 400
      L 656 446
      L 722 446
      L 722 400
      Z
      M 689 400 L 689 446
      M 656 423 L 722 423
    "/>
    <path stroke-width="1.0" stroke-opacity="0.55" d="
      M 658 402
      L 658 444
      L 720 444
      L 720 402 Z
    "/>

    <!-- A footpath mark — soft breathing dashes that fade away. -->
    <path stroke-width="1.2" stroke-opacity="0.45" stroke-dasharray="8 12" d="
      M 100 524
      C 240 521 400 519 580 519
      C 760 519 920 521 1060 524
    "/>
    <path stroke-width="0.7" stroke-opacity="0.32" stroke-dasharray="4 14" d="
      M 130 536
      C 270 533 430 531 600 531
      C 770 531 920 533 1040 536
    "/>

  </g>

</svg>
