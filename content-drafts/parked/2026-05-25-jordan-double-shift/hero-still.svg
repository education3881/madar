    <!-- ruled writing — right page -->
    <path stroke-width="1.6" stroke-opacity="0.70" d="
      M 658 248 C 706 246 802 244 910 246
      M 658 282 C 710 280 802 278 910 280
      M 658 316 C 706 314 780 312 872 314
