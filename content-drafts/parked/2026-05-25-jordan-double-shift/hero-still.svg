      M 244 192
      C 268 188 308 184 362 182
      C 444 179 540 178 598 178
      L 598 182
      C 660 178 754 179 834 182
      C 888 184 928 188 952 192
      C 958 193 962 200 958 206
      C 946 226 938 252 934 286
      C 928 328 928 366 932 408
      C 936 442 944 466 956 480
      C 960 484 958 488 952 490
      C 924 498 876 504 822 508
    "/>
    <path stroke-width="0.7" stroke-opacity="0.42" d="
      M 248 196
      C 270 192 310 188 364 186
      C 446 183 540 182 598 182
    "/>

    <!-- ruled writing — left page (long calligraphic horizontal strokes) -->
    <path stroke-width="1.6" stroke-opacity="0.70" d="
      M 288 248 C 336 246 432 244 540 246
      M 288 282 C 340 280 432 278 540 280
      M 288 316 C 336 314 410 312 502 314
      M 288 350 C 340 348 432 346 540 348
      M 288 384 C 332 382 414 380 502 382
      M 288 418 C 340 416 420 414 510 416
      M 288 452 C 338 450 414 448 494 450
