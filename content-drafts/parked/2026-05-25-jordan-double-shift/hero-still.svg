      M 658 384 C 702 382 784 380 872 382
      M 658 418 C 710 416 790 414 880 416
      M 658 452 C 708 450 784 448 864 450
    "/>
    <path stroke-width="0.8" stroke-opacity="0.45" d="
      M 660 250 C 708 248 802 246 910 248
      M 660 284 C 712 282 802 280 910 282
      M 660 318 C 708 316 780 314 872 316
      M 660 352 C 712 350 802 348 910 350
      M 660 386 C 704 384 784 382 872 384
      M 660 420 C 712 418 790 416 880 418
    "/>

    <!-- the marginal change-mark (a small calligraphic notation) -->
    <path stroke-width="2.0" stroke-opacity="0.80" d="
      M 545 310 C 558 304 568 298 574 290
      M 545 326 C 562 332 572 340 576 350
    "/>
  </g>

