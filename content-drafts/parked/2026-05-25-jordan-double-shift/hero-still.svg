<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 600"
     preserveAspectRatio="xMidYMid slice"
     role="img"
     aria-label="Three continuous calligraphic lines, in three colours, drawing the same open textbook page in slightly offset positions — three editions of the same gesture, encoding the civics page that changed three times.">

  <title>The Still · Jordan — the civics page that changed three times</title>
  <desc>Three continuous lines drawn from beginning to end without lifting the pen, each one rendering the same open textbook page in slightly different positions and ink colours. The viewer sees three editions of one continuous gesture, layered as a palimpsest — the page changed three times. No filled volumes; the lines are the image; the ground is paper-cream.</desc>

  <!-- Paper-cream ground. -->
  <rect x="0" y="0" width="1200" height="600" fill="#FAFAF7"/>

  <!--
    ============================================================
    THREE CONTINUOUS GESTURES OF THE SAME OPEN TEXTBOOK PAGE.
    Each gesture draws:
       1) the spine of an open book (a soft vertical kink)
       2) the left page outline
       3) the right page outline
       4) ruled writing lines on the left page (short horizontal strokes)
       5) ruled writing lines on the right page
       6) a small marginal mark (the change-mark)
    Each gesture is one path. The three layers are offset by ~10px
    in x and ~6px in y, creating the palimpsest of three editions.
    Colours: ink (first / oldest edition), sage (second edition),
    kiln-orange (third / current edition). Variable stroke weight
    by stacking each gesture at widths 2.4 / 1.4 / 0.7.
    ============================================================
  -->

  <!-- EDITION 1 — ink. Oldest, deepest in the stack. -->
  <g id="edition-1"
     fill="none"
     stroke="#1A2B3C"
     stroke-linecap="round"
     stroke-linejoin="round"
     transform="translate(0,0)">

    <path stroke-width="2.6" stroke-opacity="0.85" d="
      M 240 188
      C 264 184 304 180 360 178
      C 442 175 540 174 600 174
      L 600 178
      C 658 174 754 175 836 178
      C 892 180 932 184 956 188
      C 962 189 966 196 962 202
