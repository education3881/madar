<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 600"
     preserveAspectRatio="xMidYMid slice"
     role="img"
     aria-label="A composition built from one small ink rectangle repeated many times in two arrangements that share the canvas. On the left, a tight column of identical units in disciplined rows — a curriculum sequence. On the right, the same units redistributed across a broader field, lightly rotated and irregularly spaced — a feed. A single kiln-orange unit between the two arrangements is the moment of the partnership, the hinge between the two distributions. The macron motif sits at baseline, the publication's signature.">

  <title>The Still · UAE — the same units, arranged twice</title>
  <desc>An atmospheric composition for Curated 04 — UAE. A small ink rectangle is the visual unit — a single educational video. It appears twice: as a disciplined column on the left, where the platform composed the sequence; and as a scatter across the right, where the algorithm composed the distribution. One kiln-orange rectangle stands at the boundary as the cooperation-agreement moment. The composition is a visual cousin to Egypt (Curated 03, which reads as sedimentation) but argues redistribution rather than accumulation.</desc>

  <!-- Sand ground — shared register with Bahrain (Curated 02) and Egypt (Curated 03). -->
  <rect x="0" y="0" width="1200" height="600" fill="#E8E2D0"/>

  <!--
    ============================================================
    THE COLUMN — the platform's sequence.
    A tight 4-column × 11-row grid of identical small ink
    rectangles on the left third of the canvas. Same size, same
    spacing, same opacity. This is what curriculum looks like
    as a composition: order made of repetition.
    Unit: 18 × 6, gap-x 14, gap-y 10. Starting at x=150, y=110.
    ============================================================
  -->
  <g id="column" fill="#0E1B2C" fill-opacity="0.86">
    <!-- Row 1 -->
    <rect x="150" y="110" width="18" height="6"/>
    <rect x="182" y="110" width="18" height="6"/>
    <rect x="214" y="110" width="18" height="6"/>
    <rect x="246" y="110" width="18" height="6"/>
    <!-- Row 2 -->
    <rect x="150" y="126" width="18" height="6"/>
    <rect x="182" y="126" width="18" height="6"/>
    <rect x="214" y="126" width="18" height="6"/>
    <rect x="246" y="126" width="18" height="6"/>
    <!-- Row 3 -->
    <rect x="150" y="142" width="18" height="6"/>
    <rect x="182" y="142" width="18" height="6"/>
    <rect x="214" y="142" width="18" height="6"/>
    <rect x="246" y="142" width="18" height="6"/>
    <!-- Row 4 -->
    <rect x="150" y="158" width="18" height="6"/>
    <rect x="182" y="158" width="18" height="6"/>
    <rect x="214" y="158" width="18" height="6"/>
    <rect x="246" y="158" width="18" height="6"/>
    <!-- Row 5 -->
    <rect x="150" y="174" width="18" height="6"/>
    <rect x="182" y="174" width="18" height="6"/>
    <rect x="214" y="174" width="18" height="6"/>
    <rect x="246" y="174" width="18" height="6"/>
    <!-- Row 6 -->
    <rect x="150" y="190" width="18" height="6"/>
    <rect x="182" y="190" width="18" height="6"/>
    <rect x="214" y="190" width="18" height="6"/>
    <rect x="246" y="190" width="18" height="6"/>
    <!-- Row 7 -->
    <rect x="150" y="206" width="18" height="6"/>
    <rect x="182" y="206" width="18" height="6"/>
    <rect x="214" y="206" width="18" height="6"/>
    <rect x="246" y="206" width="18" height="6"/>
    <!-- Row 8 -->
    <rect x="150" y="222" width="18" height="6"/>
    <rect x="182" y="222" width="18" height="6"/>
    <rect x="214" y="222" width="18" height="6"/>
    <rect x="246" y="222" width="18" height="6"/>
    <!-- Row 9 -->
    <rect x="150" y="238" width="18" height="6"/>
    <rect x="182" y="238" width="18" height="6"/>
    <rect x="214" y="238" width="18" height="6"/>
    <rect x="246" y="238" width="18" height="6"/>
    <!-- Row 10 -->
    <rect x="150" y="254" width="18" height="6"/>
    <rect x="182" y="254" width="18" height="6"/>
    <rect x="214" y="254" width="18" height="6"/>
    <rect x="246" y="254" width="18" height="6"/>
    <!-- Row 11 -->
    <rect x="150" y="270" width="18" height="6"/>
    <rect x="182" y="270" width="18" height="6"/>
    <rect x="214" y="270" width="18" height="6"/>
    <rect x="246" y="270" width="18" height="6"/>
  </g>

  <!--
    ============================================================
    THE HINGE — one kiln-orange unit between the column and
    the scatter. This is the cooperation agreement: the same
    unit, but in a different colour register, sitting on the
    boundary between the two distributions.
    ============================================================
  -->
  <g id="hinge" fill="#D94F2A">
    <rect x="332" y="190" width="22" height="7"/>
  </g>

  <!--
    ============================================================
    THE SCATTER — the algorithm's distribution.
    The same unit (18 × 6, same ink color) redistributed across
    the right two-thirds of the canvas. Slightly rotated and
    irregularly spaced. The unit is the same; the arrangement
    is not. The opacity is also slightly varied — content in a
    feed is not all weighted equally; the algorithm's logic is
    the difference.
    ============================================================
  -->
  <g id="scatter" fill="#0E1B2C">
    <rect x="430" y="118" width="18" height="6" fill-opacity="0.82" transform="rotate(7 439 121)"/>
    <rect x="498" y="148" width="18" height="6" fill-opacity="0.72" transform="rotate(-5 507 151)"/>
    <rect x="572" y="102" width="18" height="6" fill-opacity="0.88" transform="rotate(12 581 105)"/>
    <rect x="640" y="170" width="18" height="6" fill-opacity="0.68" transform="rotate(-9 649 173)"/>
    <rect x="712" y="124" width="18" height="6" fill-opacity="0.84" transform="rotate(4 721 127)"/>
    <rect x="784" y="180" width="18" height="6" fill-opacity="0.74" transform="rotate(-14 793 183)"/>
    <rect x="858" y="138" width="18" height="6" fill-opacity="0.78" transform="rotate(9 867 141)"/>
    <rect x="932" y="106" width="18" height="6" fill-opacity="0.86" transform="rotate(-7 941 109)"/>
    <rect x="1006" y="156" width="18" height="6" fill-opacity="0.72" transform="rotate(11 1015 159)"/>

    <rect x="446" y="218" width="18" height="6" fill-opacity="0.80" transform="rotate(-3 455 221)"/>
    <rect x="520" y="244" width="18" height="6" fill-opacity="0.70" transform="rotate(10 529 247)"/>
    <rect x="594" y="208" width="18" height="6" fill-opacity="0.84" transform="rotate(-12 603 211)"/>
    <rect x="668" y="262" width="18" height="6" fill-opacity="0.66" transform="rotate(6 677 265)"/>
    <rect x="740" y="226" width="18" height="6" fill-opacity="0.78" transform="rotate(-8 749 229)"/>
    <rect x="816" y="266" width="18" height="6" fill-opacity="0.72" transform="rotate(13 825 269)"/>
    <rect x="890" y="216" width="18" height="6" fill-opacity="0.82" transform="rotate(-6 899 219)"/>
    <rect x="966" y="250" width="18" height="6" fill-opacity="0.70" transform="rotate(8 975 253)"/>

    <rect x="424" y="304" width="18" height="6" fill-opacity="0.78" transform="rotate(5 433 307)"/>
    <rect x="496" y="338" width="18" height="6" fill-opacity="0.68" transform="rotate(-11 505 341)"/>
    <rect x="570" y="296" width="18" height="6" fill-opacity="0.86" transform="rotate(9 579 299)"/>
    <rect x="642" y="348" width="18" height="6" fill-opacity="0.72" transform="rotate(-4 651 351)"/>
    <rect x="716" y="312" width="18" height="6" fill-opacity="0.80" transform="rotate(12 725 315)"/>
    <rect x="790" y="354" width="18" height="6" fill-opacity="0.66" transform="rotate(-9 799 357)"/>
    <rect x="864" y="320" width="18" height="6" fill-opacity="0.82" transform="rotate(7 873 323)"/>
    <rect x="936" y="296" width="18" height="6" fill-opacity="0.74" transform="rotate(-13 945 299)"/>
    <rect x="1014" y="340" width="18" height="6" fill-opacity="0.78" transform="rotate(3 1023 343)"/>

    <rect x="452" y="402" width="18" height="6" fill-opacity="0.74" transform="rotate(-7 461 405)"/>
    <rect x="528" y="426" width="18" height="6" fill-opacity="0.66" transform="rotate(11 537 429)"/>
    <rect x="600" y="388" width="18" height="6" fill-opacity="0.84" transform="rotate(-6 609 391)"/>
    <rect x="672" y="438" width="18" height="6" fill-opacity="0.70" transform="rotate(9 681 441)"/>
    <rect x="744" y="410" width="18" height="6" fill-opacity="0.78" transform="rotate(-12 753 413)"/>
    <rect x="822" y="444" width="18" height="6" fill-opacity="0.68" transform="rotate(5 831 447)"/>
    <rect x="894" y="402" width="18" height="6" fill-opacity="0.82" transform="rotate(-10 903 405)"/>
    <rect x="970" y="430" width="18" height="6" fill-opacity="0.72" transform="rotate(8 979 433)"/>
  </g>

  <!--
    ============================================================
    BASELINE MACRON — the publication's signature gesture,
    same proportions and placement across all four stills.
    ============================================================
  -->
  <g id="baseline" stroke="#0E1B2C" stroke-width="1.3" stroke-linecap="square">
    <line x1="540" y1="558" x2="660" y2="558"/>
    <line x1="540" y1="552" x2="540" y2="566"/>
    <line x1="660" y1="552" x2="660" y2="566"/>
  </g>

</svg>
