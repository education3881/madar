    THE STACKS — the rebuilt shelves.
    A long horizontal field of small vertical rectangles
    (books standing on a shelf), mostly upright but with
    several rotated/fallen. Three baseline rows.
    Unit: 6 × 28 upright. Spacing varied between 11 and 14.
    ============================================================
  -->

