<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 600"
     preserveAspectRatio="xMidYMid slice"
     role="img"
     aria-label="A composition built on a sand-coloured ground. A horizontal field of small ink rectangles, mostly upright like books on a shelf, with several scattered or rotated at irregular angles — the collection in mid-recovery. A single kiln-orange rectangle in the upper third marks the reopened reading room. The macron motif at baseline closes the composition.">

  <title>The Still · Iraq — the shelves, recovered</title>
  <desc>An atmospheric composition for Curated 06 — Iraq. A small ink rectangle is the visual unit — a single book on a library shelf. The units appear as a long horizontal field across the canvas: most upright in a disciplined row, several at rotated angles or fallen, representing the catalogue in mid-recovery after the 2014-17 fire. A single kiln-orange rectangle in the upper third marks the reopened reading room, the institutional anchor that returned in February 2022. The composition argues recovery as accumulation of what stands, not erasure of what fell.</desc>

  <!-- Sand ground -->
  <rect x="0" y="0" width="1200" height="600" fill="#E8E2D0"/>

  <!-- The reopened reading room — single kiln-orange rectangle in the upper third -->
  <rect x="540" y="140" width="120" height="22" fill="#D94F2A" fill-opacity="0.92"/>

  <!-- Hairline rule below the reading room — the macron at the boundary between institutional return and shelf-level recovery -->
  <line x1="150" y1="200" x2="1050" y2="200" stroke="#0E1B2C" stroke-width="1" stroke-opacity="0.55"/>

  <!--
