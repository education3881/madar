<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 600"
     preserveAspectRatio="xMidYMid slice"
     role="img"
     aria-label="A continuous calligraphic line drawing. On the left, a loose scatter of small spoken sound-marks rises at a child's height. On the right, an abstract written letterform stands on a baseline, in ink. A single kiln-orange line bridges the distance from the last spoken mark to the written form, closing on a small ring. The ground is paper-cream, nothing else.">

  <title>The Still · United Arab Emirates — the bridge from the spoken to the written</title>
  <desc>One continuous calligraphic line in ink: a scatter of small sound-marks — the child's spoken language — drifts upward on the left, while an abstract written letterform, suggesting script without spelling anything, stands on a baseline at the right. A second gesture in kiln-orange is the bridge: a single tapered line that leaves the highest spoken mark, crosses the open distance, and lands at the foot of the written form, closing on a small ring. No filled volumes; the line is the image; the ground is paper-cream.</desc>

  <!-- Paper-cream ground. Nothing else underneath the line. -->
  <rect x="0" y="0" width="1200" height="600" fill="#FAFAF7"/>

  <!--
    ============================================================
    PRIMARY GESTURE — ink (#1A2B3C)
    The baseline, the spoken scatter (left, child-height), and
    the written letterform (right). Triple-weight discipline:
    paths stacked at descending widths/opacities to breathe.
    No fills, no filters, no gradients. The line IS the image.
    ============================================================
  -->

  <g id="ink-line"
     fill="none"
     stroke="#1A2B3C"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!-- THE BASELINE — the page's ruled line, low and steady. -->
    <path stroke-width="2" stroke-opacity="0.45" d="
      M 110 478
      C 290 470 480 466 660 468
      C 840 470 1000 474 1095 480
    "/>
    <path stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="6 9" d="
      M 160 492
      C 330 485 520 482 690 483
      C 850 484 970 487 1050 492
    "/>

    <!-- THE SPOKEN SCATTER — small sound-marks at a child's height,
         left field. Short open strokes and dots, loosening as they rise:
         speech, not yet writing. -->
    <g stroke-width="2.6" stroke-opacity="0.85">
      <path d="M 178 446 C 184 440 192 440 197 445"/>
      <path d="M 226 430 C 233 423 242 424 247 430"/>
      <path d="M 196 398 C 203 392 211 393 215 398"/>
      <path d="M 256 388 C 262 381 271 381 276 387"/>
      <path d="M 232 352 C 239 346 247 347 251 352"/>
      <path d="M 292 344 C 298 337 307 338 312 344"/>
      <path d="M 268 308 C 275 302 283 303 287 308"/>
      <path d="M 322 296 C 328 290 337 291 341 296"/>
      <path d="M 300 262 C 307 256 315 257 319 262"/>
    </g>
    <!-- the dots above the marks — the breath of each sound -->
    <g stroke-width="3.4" stroke-opacity="0.8">
      <path d="M 188 424 L 188.5 423.6"/>
      <path d="M 238 408 L 238.5 407.6"/>
      <path d="M 266 366 L 266.5 365.6"/>
      <path d="M 304 322 L 304.5 321.6"/>
      <path d="M 334 274 L 334.5 273.6"/>
    </g>
    <!-- faint echo of the scatter — the same marks, lighter, displaced:
         a vernacular spoken many ways -->
    <g stroke-width="1.1" stroke-opacity="0.3">
      <path d="M 152 420 C 158 414 166 414 171 419"/>
      <path d="M 208 372 C 215 366 223 367 227 372"/>
      <path d="M 246 330 C 252 324 261 324 266 330"/>
      <path d="M 286 282 C 292 276 301 277 305 282"/>
    </g>

    <!-- THE WRITTEN FORM — an abstract calligraphic letterform on the
         baseline, right field. It suggests script — a tall ascender, a
         deep open bowl, a final tooth — without spelling any word.
         One continuous travel of the pen, stacked at three weights. -->
    <path stroke-width="5" stroke-opacity="0.92" d="
      M 872 472
      C 868 430 870 388 884 352
      C 896 322 918 304 936 312
      C 952 320 950 352 932 376
      C 916 398 896 410 884 438
      C 876 458 888 472 916 474
      C 956 477 992 470 1014 448
      C 1032 430 1034 404 1020 396
      C 1006 388 990 402 992 422
      C 994 444 1014 462 1042 466
    "/>
    <path stroke-width="2.2" stroke-opacity="0.5" d="
      M 866 474
      C 861 428 864 382 880 344
      C 893 312 920 294 942 306
    "/>
    <path stroke-width="1" stroke-opacity="0.28" d="
      M 1046 458
      C 1060 448 1066 432 1062 418
    "/>
    <!-- the written form's own dot, deliberate where the spoken dots drift -->
    <path stroke-width="4.6" stroke-opacity="0.88" d="M 948 282 L 948.5 281.6"/>
  </g>

  <!--
    ============================================================
    SECOND GESTURE — kiln-orange (#C75B39)
    The bridge. One tapered line leaves the highest spoken mark,
    crosses the open middle, and lands at the foot of the written
    form, closing on a small ring. The only warm thing on the page.
    ============================================================
  -->

  <g id="orange-line"
     fill="none"
     stroke="#C75B39"
     stroke-linecap="round"
     stroke-linejoin="round">

    <path stroke-width="3.4" stroke-opacity="0.95" d="
      M 330 270
      C 420 240 520 248 600 290
      C 680 332 740 396 820 444
      C 838 455 854 463 866 468
    "/>
    <!-- the lift-off: the line gathers the last spoken mark before it goes -->
    <path stroke-width="1.6" stroke-opacity="0.55" d="
      M 308 286
      C 316 278 324 272 330 270
    "/>
    <!-- the landing ring — small, closed, at the foot of the written form -->
    <path stroke-width="2.6" stroke-opacity="0.9" d="
      M 866 468
      C 874 460 886 462 888 471
      C 890 480 880 486 872 482
      C 864 478 862 472 866 468
      Z
    "/>
    <!-- a faint return whisper — the bridge runs both ways -->
    <path stroke-width="0.9" stroke-opacity="0.3" stroke-dasharray="4 10" d="
      M 846 430
      C 760 380 660 318 560 280
      C 480 250 400 248 348 262
    "/>
  </g>
</svg>
