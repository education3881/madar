<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 600"
     preserveAspectRatio="xMidYMid slice"
     role="img"
     aria-label="A single continuous calligraphic line drawing of a scatter of small school-marks across an open ground, in ink, with faint lines reaching between them to suggest a matching web. One bolder line, in kiln-orange, travels from a teacher-mark to a distant school-mark — the one match that lands. The ground is paper-cream, nothing else.">

  <title>The Still · Sierra Leone — the match that reaches the far school</title>
  <desc>One continuous calligraphic line in ink scatters a handful of small school-marks across an open ground and reaches faint connectors between them — the deployment problem as a web of possible placements. A second gesture in kiln-orange is the single match that completes: a tapered line from a near teacher-mark out to the most distant, most under-served school, closing on a small ring. No filled volumes; the line is the image; the ground is paper-cream.</desc>

  <!-- Paper-cream ground. Nothing else underneath the line. -->
  <rect x="0" y="0" width="1200" height="600" fill="#FAFAF7"/>

  <!--
    ============================================================
    PRIMARY GESTURE — ink (#1A2B3C)
    The open ground, a scatter of school-marks, and the faint web
    of possible matches between them. Triple-weight discipline:
    paths stacked at descending widths/opacities to breathe.
    No fills, no filters, no gradients. The line IS the image.
    ============================================================
  -->

  <g id="ink-line"
     fill="none"
     stroke="#1A2B3C"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!-- THE GROUND — a soft, broken calligraphic horizon, low. -->
    <path stroke-width="1.8" stroke-opacity="0.42" d="
      M 120 470
      C 280 462 460 458 640 460
      C 820 462 980 466 1090 472
    "/>
    <path stroke-width="0.7" stroke-opacity="0.26" stroke-dasharray="5 8" d="
      M 180 482
      C 340 475 500 472 660 473
      C 820 474 950 477 1040 482
    "/>

    <!--
      THE MATCHING WEB — faint connectors between the school-marks.
      Drawn first/underneath so the nodes sit on top. Low opacity:
      these are the possibilities, not the placement.
    -->
    <path stroke-width="0.9" stroke-opacity="0.30" d="
      M 300 250 C 430 270 560 300 690 312
      M 300 250 C 470 360 640 420 856 360
      M 690 312 C 800 300 900 280 980 240
      M 470 200 C 560 250 660 300 856 360
      M 690 312 C 560 380 440 410 320 408
    "/>
    <path stroke-width="0.6" stroke-opacity="0.22" stroke-dasharray="3 6" d="
      M 300 250 C 420 230 540 214 690 312
      M 980 240 C 900 320 880 360 856 360
    "/>

    <!--
      THE SCHOOL-MARKS — small breathing rings, each with a short
      roof-tick above. Scattered, never on a grid. Triple weight
      on the rings nearest the eye.
    -->

    <!-- node A (upper-left) -->
    <path stroke-width="2.2" stroke-opacity="0.86" d="
      M 286 250 C 286 240 294 232 304 232 C 314 232 322 240 322 250
      C 322 260 314 268 304 268 C 294 268 286 260 286 250 Z"/>
    <path stroke-width="1.0" stroke-opacity="0.5" d="
      M 290 250 C 290 242 296 236 304 236 C 312 236 318 242 318 250"/>
    <path stroke-width="1.8" stroke-opacity="0.72" d="M 292 226 L 304 214 L 316 226"/>

    <!-- node B (upper-mid) -->
    <path stroke-width="2.0" stroke-opacity="0.82" d="
      M 454 200 C 454 191 461 184 470 184 C 479 184 486 191 486 200
      C 486 209 479 216 470 216 C 461 216 454 209 454 200 Z"/>
    <path stroke-width="1.6" stroke-opacity="0.66" d="M 459 178 L 470 167 L 481 178"/>

    <!-- node C (centre) -->
    <path stroke-width="2.2" stroke-opacity="0.86" d="
      M 672 312 C 672 301 681 292 692 292 C 703 292 712 301 712 312
      C 712 323 703 332 692 332 C 681 332 672 323 672 312 Z"/>
    <path stroke-width="1.0" stroke-opacity="0.5" d="
      M 677 312 C 677 303 684 296 692 296 C 700 296 707 303 707 312"/>
    <path stroke-width="1.8" stroke-opacity="0.72" d="M 679 286 L 692 273 L 705 286"/>

    <!-- node D (lower-left) -->
    <path stroke-width="2.0" stroke-opacity="0.80" d="
      M 304 408 C 304 399 311 392 320 392 C 329 392 336 399 336 408
      C 336 417 329 424 320 424 C 311 424 304 417 304 408 Z"/>
    <path stroke-width="1.6" stroke-opacity="0.64" d="M 309 386 L 320 375 L 331 386"/>

    <!-- node E (upper-right) -->
    <path stroke-width="2.0" stroke-opacity="0.80" d="
      M 964 240 C 964 231 971 224 980 224 C 989 224 996 231 996 240
      C 996 249 989 256 980 256 C 971 256 964 249 964 240 Z"/>
    <path stroke-width="1.6" stroke-opacity="0.64" d="M 969 218 L 980 207 L 991 218"/>

    <!-- node F (a faint, far one — under-served, drawn lightest) -->
    <path stroke-width="1.2" stroke-opacity="0.42" stroke-dasharray="4 5" d="
      M 828 360 C 828 346 840 334 856 334 C 872 334 884 346 884 360
      C 884 374 872 386 856 386 C 840 386 828 374 828 360 Z"/>
    <path stroke-width="1.0" stroke-opacity="0.4" d="M 840 330 L 856 316 L 872 330"/>

    <!-- the teacher-mark: a single short vertical with a soft head,
         the person waiting to be placed (lower-centre, near the eye) -->
    <path stroke-width="2.6" stroke-opacity="0.88" d="M 560 470 L 560 416"/>
    <path stroke-width="1.3" stroke-opacity="0.6" d="M 562 468 L 562 420"/>
    <path stroke-width="2.4" stroke-opacity="0.86" d="
      M 549 406 C 549 400 554 395 560 395 C 566 395 571 400 571 406
      C 571 412 566 417 560 417 C 554 417 549 412 549 406 Z"/>
  </g>

  <!--
    ============================================================
    SECOND GESTURE — kiln-orange (#D94F2A)
    THE MATCH THAT LANDS. One continuous, tapered, breathing line
    that leaves the teacher-mark and arcs out to the most distant,
    most under-served school (node F), closing on a small ring —
    the placement that actually completes. Same triple-weight
    discipline; this is the one certainty in a field of maybes.
    ============================================================
  -->

  <g id="match-line"
     fill="none"
     stroke="#D94F2A"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!-- the arc — heavy, tapering as it travels -->
    <path stroke-width="4.4" stroke-opacity="0.86" d="
      M 566 404
      C 640 372 712 350 786 350
      C 812 350 832 354 846 360
    "/>
    <path stroke-width="2.4" stroke-opacity="0.6" d="
      M 572 402 C 644 372 712 354 786 354 C 808 354 826 357 840 362"/>
    <path stroke-width="1.1" stroke-opacity="0.42" d="
      M 580 400 C 648 374 712 358 786 358"/>

    <!-- the landing ring — the far school, now reached -->
    <path stroke-width="3.0" stroke-opacity="0.84" d="
      M 838 360 C 838 348 847 339 858 339 C 869 339 878 348 878 360
      C 878 372 869 381 858 381 C 847 381 838 372 838 360 Z"/>
    <path stroke-width="1.4" stroke-opacity="0.5" d="
      M 843 360 C 843 351 850 344 858 344 C 866 344 873 351 873 360"/>

    <!-- a small breath of dust at the landing, upward-right -->
    <path stroke-width="1.4" stroke-opacity="0.55" d="M 884 346 C 894 334 902 324 908 312"/>
    <path stroke-width="0.8" stroke-opacity="0.36" d="M 898 338 C 908 330 916 322 922 312"/>
  </g>

</svg>
