  <!-- The kiln-orange glyph — two crossing strokes between rule 2 and rule 3 -->
  <g id="orange-glyph">
    <!-- stroke A — from lower left to upper right -->
    <line x1="780" y1="396" x2="848" y2="354" stroke="#D94F2A" stroke-width="3" stroke-linecap="round" stroke-opacity="0.95"/>
    <!-- stroke B — from upper left to lower right -->
    <line x1="780" y1="354" x2="848" y2="396" stroke="#D94F2A" stroke-width="3" stroke-linecap="round" stroke-opacity="0.95"/>
  </g>

  <!-- Macron motif at baseline -->
  <line x1="540" y1="572" x2="660" y2="572" stroke="#0E1B2C" stroke-width="1.2" stroke-opacity="0.78"/>

  <!-- Kicker text -->
  <text x="150" y="572" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#7A8471" fill-opacity="0.78">CURATED · 09 · INDONESIA</text>
  <text x="1050" y="572" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#7A8471" fill-opacity="0.78" text-anchor="end">سكون</text>

</svg>
