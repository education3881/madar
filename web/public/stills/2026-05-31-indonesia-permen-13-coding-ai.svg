<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 600"
     preserveAspectRatio="xMidYMid slice"
     role="img"
     aria-label="A composition on sand ground. Three horizontal ink rules of equal weight stack at unequal intervals down the field — the visual rhythm of a regulation page. Between the second and third rule, a single small kiln-orange glyph: two crossing strokes that read as both an addition sign and a small handshake. The composition is the place where one regulation introduces something new by saying it joins what was already there.">

  <title>The Still · Indonesia — The minister insists: not a new curriculum</title>
  <desc>An atmospheric composition for Curated 09 — Indonesia. Three horizontal ink rules of equal weight, stacked at unequal intervals, evoke a regulation page with its lines of articles. The first rule sits at one fifth from the top; the second at one half; the third at three quarters. Between the second and third rule, a single small kiln-orange glyph — two crossing strokes that read as an addition sign rotated slightly, or as a handshake folded to its simplest form — marks the place where two earlier curricula are being held together by a third regulation. A sparse scatter of small ink ticks distributes across the field at low opacity, the visual texture of a working document rather than a finished page.</desc>

  <!-- Sand ground -->
  <rect x="0" y="0" width="1200" height="600" fill="#E8E2D0"/>

  <!-- The three rules — equal weight, unequal interval -->
  <line x1="150" y1="120" x2="1050" y2="120" stroke="#0E1B2C" stroke-width="1" stroke-opacity="0.85"/>
  <line x1="150" y1="300" x2="1050" y2="300" stroke="#0E1B2C" stroke-width="1" stroke-opacity="0.85"/>
  <line x1="150" y1="450" x2="1050" y2="450" stroke="#0E1B2C" stroke-width="1" stroke-opacity="0.85"/>

  <!-- Small caption-like ink ticks above and below the rules, suggesting the body text of a regulation page at low opacity -->
  <g id="lines-above-rule-1" fill="#0E1B2C" fill-opacity="0.18">
    <rect x="180" y="82" width="60" height="3"/>
    <rect x="252" y="82" width="40" height="3"/>
    <rect x="304" y="82" width="80" height="3"/>
    <rect x="396" y="82" width="50" height="3"/>
    <rect x="458" y="82" width="34" height="3"/>
    <rect x="504" y="82" width="70" height="3"/>
    <rect x="586" y="82" width="46" height="3"/>
  </g>
  <g id="lines-between-1-2" fill="#0E1B2C" fill-opacity="0.18">
    <rect x="180" y="148" width="44" height="3"/>
    <rect x="236" y="148" width="80" height="3"/>
    <rect x="328" y="148" width="56" height="3"/>
