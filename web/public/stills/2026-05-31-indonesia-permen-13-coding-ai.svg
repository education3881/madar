    <rect x="330" y="200" width="48" height="3"/>
    <rect x="390" y="200" width="58" height="3"/>
    <rect x="460" y="200" width="70" height="3"/>
    <rect x="180" y="226" width="76" height="3"/>
    <rect x="268" y="226" width="42" height="3"/>
    <rect x="322" y="226" width="60" height="3"/>
    <rect x="394" y="226" width="50" height="3"/>
    <rect x="180" y="252" width="54" height="3"/>
    <rect x="246" y="252" width="80" height="3"/>
    <rect x="338" y="252" width="44" height="3"/>
    <rect x="394" y="252" width="64" height="3"/>
    <rect x="470" y="252" width="38" height="3"/>
  </g>
  <g id="lines-between-2-3" fill="#0E1B2C" fill-opacity="0.18">
    <rect x="180" y="328" width="68" height="3"/>
    <rect x="260" y="328" width="40" height="3"/>
    <rect x="312" y="328" width="72" height="3"/>
    <rect x="396" y="328" width="50" height="3"/>
    <rect x="458" y="328" width="62" height="3"/>
    <rect x="532" y="328" width="36" height="3"/>
    <rect x="580" y="328" width="58" height="3"/>
