<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 600"
     preserveAspectRatio="xMidYMid slice"
     role="img"
     aria-label="A single continuous calligraphic line drawing of a chalkboard with last term's half-erased writing inside it, in ink. A second line, in kiln-orange, suggests the stick of chalk and a small dusting trail. The ground is paper-cream, nothing else.">

  <title>The Still · Sierra Leone — the chalkboard that still wears last term's writing</title>
  <desc>One continuous calligraphic line in ink — the pen lands at the upper-left, breathes its way around the chalkboard's perimeter, and writes inside the board the partial arithmetic and word that the teacher in Bo did not erase. A second short line in kiln-orange is the stick of chalk lying on the ledge and a soft drift of chalk-dust. No filled volumes; the line is the image; the ground is paper-cream.</desc>

  <!-- Paper-cream ground. Nothing else underneath the line. -->
  <rect x="0" y="0" width="1200" height="600" fill="#FAFAF7"/>

  <!--
    ============================================================
    PRIMARY GESTURE — ink (#1A2B3C)
    ONE continuous calligraphic line. The pen lands at the upper-
    left and:
      1. Travels rightward and around to enclose the chalkboard
         (with a soft, breathing rectangle — never CAD-perfect).
      2. Without lifting, flows inward and writes:
            "ECE"  (half-erased)   ||||  +  ||||  =  ||
         then an underline beneath.
      3. Exits the board at the lower edge and trails into the
         two-legged stand and the floor.
    Variable stroke weight is achieved by stacking 3 paths at
    widths 3.0 / 1.8 / 0.9 with the same approximate gesture and
    slightly different opacities — the breathing of a brush.
    No fills, no filters, no gradients. The line IS the image.
    ============================================================
  -->

  <g id="ink-line"
     fill="none"
     stroke="#1A2B3C"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!-- BOARD PERIMETER — heavy weight, single closed gesture. -->
    <path stroke-width="3.0" stroke-opacity="0.92" d="
      M 218 178
      C 256 168 296 162 338 160
      C 442 156 564 156 698 158
      C 802 159 880 162 944 168
      C 962 170 974 182 974 202
      C 974 244 974 296 974 348
      C 974 384 972 412 968 432
      C 966 446 956 454 938 456
      C 854 460 720 462 580 462
      C 458 462 340 460 264 458
      C 244 457 232 446 230 424
      C 228 384 226 332 226 280
      C 226 246 228 222 232 204
      C 236 188 246 180 264 178
      C 308 175 360 174 414 174
      C 488 174 562 175 632 178
    "/>

    <!-- Perimeter — medium weight, slightly offset (breath). -->
    <path stroke-width="1.8" stroke-opacity="0.74" d="
      M 220 180
      C 258 170 296 164 340 162
      C 444 158 564 158 700 160
      C 802 161 880 164 944 170
      C 962 172 972 184 972 202
      C 972 244 972 296 972 348
      C 972 382 970 410 966 430
      C 964 444 954 452 938 454
      C 854 458 720 460 580 460
      C 458 460 340 458 264 456
      C 246 455 234 444 232 424
      C 230 384 228 332 228 280
      C 228 246 230 224 234 206
    "/>

    <!-- Perimeter — fine weight, the smallest tremor. -->
    <path stroke-width="0.9" stroke-opacity="0.55" d="
      M 222 182
      C 260 172 298 166 342 164
      C 444 160 564 160 700 162
      C 802 163 880 166 942 172
      C 960 174 970 186 970 204
      C 970 244 970 294 970 346
    "/>

    <!--
      ============================================================
      INTERIOR WRITING — same continuous line, no lift.
      It enters the board and writes:
        E  C  E   (half-erased — second E breaks)
        ||||  +  ||||  =  ||
      Then draws a long calligraphic underline beneath.
      ============================================================
    -->

    <!-- "E" — heavy -->
    <path stroke-width="2.6" stroke-opacity="0.88" d="
      M 320 254 L 320 358
      M 320 254 L 376 254
      M 320 304 L 364 304
      M 320 358 L 376 358
    "/>
    <path stroke-width="1.3" stroke-opacity="0.62" d="
      M 322 256 L 322 356
      M 322 256 L 374 256
      M 322 306 L 360 306
      M 322 356 L 374 356
    "/>

    <!-- "C" -->
    <path stroke-width="2.6" stroke-opacity="0.88" d="
      M 444 268
      C 432 256 412 252 396 258
      C 376 266 366 286 366 308
      C 366 332 378 352 398 358
      C 416 362 432 358 444 348
    "/>
    <path stroke-width="1.3" stroke-opacity="0.62" d="
      M 442 270
      C 432 260 414 256 398 260
      C 380 268 370 286 370 308
      C 370 330 380 348 398 354
    "/>

    <!-- "E" — second, partly erased. The bottom horizontal is missing. -->
    <path stroke-width="2.6" stroke-opacity="0.88" d="
      M 478 254 L 478 358
      M 478 254 L 534 254
      M 478 304 L 522 304
    "/>
    <!-- A faint trace of what was erased — dashed, low opacity -->
    <path stroke-width="0.7" stroke-opacity="0.35" stroke-dasharray="4 5" d="
      M 478 358 L 534 358
    "/>
    <path stroke-width="1.3" stroke-opacity="0.62" d="
      M 480 256 L 480 356
      M 480 256 L 532 256
      M 480 306 L 520 306
    "/>

    <!-- Tally marks |||| -->
    <path stroke-width="2.6" stroke-opacity="0.88" d="
      M 596 258 L 592 360
      M 614 256 L 610 360
      M 630 258 L 626 360
      M 648 256 L 644 360
    "/>
    <path stroke-width="1.3" stroke-opacity="0.62" d="
      M 597 260 L 593 358
      M 615 258 L 611 358
      M 631 260 L 627 358
      M 649 258 L 645 358
    "/>

    <!-- + sign -->
    <path stroke-width="2.6" stroke-opacity="0.88" d="
      M 686 304 L 736 304
      M 711 280 L 711 328
    "/>
    <path stroke-width="1.3" stroke-opacity="0.62" d="
      M 686 306 L 736 306
      M 713 280 L 713 328
    "/>

    <!-- Second tally |||| -->
    <path stroke-width="2.6" stroke-opacity="0.88" d="
      M 770 258 L 766 360
      M 788 256 L 784 360
      M 804 258 L 800 360
      M 822 256 L 818 360
    "/>
    <path stroke-width="1.3" stroke-opacity="0.62" d="
      M 771 260 L 767 358
      M 789 258 L 785 358
      M 805 260 L 801 358
      M 823 258 L 819 358
    "/>

    <!-- = sign -->
    <path stroke-width="2.6" stroke-opacity="0.88" d="
      M 858 284 L 908 284
      M 858 324 L 908 324
    "/>
    <path stroke-width="1.3" stroke-opacity="0.62" d="
      M 858 286 L 908 286
      M 858 326 L 908 326
    "/>

    <!-- Final tally — but only TWO marks (the half-finished sum). -->
    <path stroke-width="2.6" stroke-opacity="0.88" d="
      M 932 258 L 928 360
    "/>
    <path stroke-width="1.3" stroke-opacity="0.62" d="
      M 933 260 L 929 358
    "/>

    <!-- A long calligraphic underline that breathes across the whole writing,
         broken in the middle as if half-erased. -->
    <path stroke-width="3.0" stroke-opacity="0.85" d="
      M 308 402
      C 372 398 444 396 524 397
      C 558 398 596 399 624 399
    "/>
    <path stroke-width="1.5" stroke-opacity="0.55" d="
      M 314 404
      C 376 400 446 398 524 399
      C 558 400 594 401 622 401
    "/>
    <!-- erased gap -->
    <path stroke-width="0.7" stroke-opacity="0.32" stroke-dasharray="5 7" d="
      M 626 401 C 666 400 706 400 744 401
    "/>
    <!-- second half of the underline -->
    <path stroke-width="3.0" stroke-opacity="0.85" d="
      M 750 402
      C 804 401 858 401 906 403
      C 920 404 930 405 942 406
    "/>
    <path stroke-width="1.5" stroke-opacity="0.55" d="
      M 754 404
      C 806 403 856 403 904 405
      C 918 406 928 407 940 408
    "/>

    <!--
      ============================================================
      THE STAND — two angled legs descending from the lower corners
      of the chalkboard out to a footing on the floor. Continuous
      with the same triple-weight discipline. The stand is asymmetric
      to keep the line alive (no CAD geometry).
      ============================================================
    -->

    <!-- Left leg -->
    <path stroke-width="2.6" stroke-opacity="0.85" d="
      M 264 462
      C 250 496 232 528 210 552
      C 200 562 196 568 200 570
      C 208 572 224 572 248 572
    "/>
    <path stroke-width="1.3" stroke-opacity="0.55" d="
      M 266 464
      C 252 498 234 528 212 552
      C 204 560 200 566 204 568
    "/>

    <!-- Right leg -->
    <path stroke-width="2.6" stroke-opacity="0.85" d="
      M 938 460
      C 950 494 968 526 988 552
      C 996 562 1000 568 996 570
      C 988 572 972 572 948 572
    "/>
    <path stroke-width="1.3" stroke-opacity="0.55" d="
      M 936 462
      C 948 494 966 526 986 552
      C 994 560 998 566 994 568
    "/>

    <!-- The floor — a soft, calligraphic, broken horizontal that
         skims the canvas. Suggests ground without filling it. -->
    <path stroke-width="1.8" stroke-opacity="0.42" d="
      M 140 572
      C 270 569 410 567 580 567
      C 750 567 900 569 1060 572
    "/>
    <path stroke-width="0.7" stroke-opacity="0.28" stroke-dasharray="5 8" d="
      M 200 580
      C 320 577 470 575 620 575
      C 770 575 900 577 1020 580
    "/>
  </g>

  <!--
    ============================================================
    SECOND GESTURE — kiln-orange (#D94F2A)
    The stick of chalk, lying along the chalkboard's ledge. One
    short, tapered, calligraphic line, with a small drift of dust
    rising from it. Same triple-weight discipline.
    ============================================================
  -->

  <g id="chalk-line"
     fill="none"
     stroke="#D94F2A"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!-- the chalk itself — tapered -->
    <path stroke-width="5.5" stroke-opacity="0.82" d="
      M 770 444
      C 810 442 856 442 902 444
    "/>
    <path stroke-width="3.0" stroke-opacity="0.55" d="
      M 776 446
      C 814 444 856 444 900 446
    "/>
    <path stroke-width="1.4" stroke-opacity="0.40" d="
      M 786 448
      C 820 446 856 446 896 448
    "/>

    <!-- the drift — three short broken strokes, breathing upward-right -->
    <path stroke-width="1.6" stroke-opacity="0.62" d="
      M 906 434
      C 916 420 924 408 930 396
    "/>
    <path stroke-width="1.0" stroke-opacity="0.42" d="
      M 920 422
      C 932 412 942 402 950 388
    "/>
    <path stroke-width="0.7" stroke-opacity="0.28" d="
      M 932 410
      C 942 402 950 396 956 386
    "/>
  </g>

</svg>
