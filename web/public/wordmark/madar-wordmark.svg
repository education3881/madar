  <!-- The alif-madda slab over the alif — the Arabic match for the Latin macron.
       Same y-coordinate and height, so the two slabs share one horizontal axis. -->
  <rect x="334.48" y="24" width="26.30" height="4.5"/>

  <!-- ============== Baseline ticked rule — the macron motif echoed below the mark ============== -->
  <g id="baseline-rule">
    <line x1="240" y1="110" x2="296" y2="110" stroke="currentColor" stroke-width="0.9"/>
    <line x1="240" y1="106" x2="240" y2="114" stroke="currentColor" stroke-width="0.9"/>
