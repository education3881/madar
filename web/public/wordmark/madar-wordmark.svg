  <!-- The macron over the second a — heavier slab than the font's own diacritic,
       wider than the bowl, so it reads as a brand event. -->
  <rect x="234.09" y="24" width="27.49" height="4.5"/>

  <!-- ============== Hairline divider ============== -->
  <line x1="300" y1="34" x2="300" y2="100" stroke="currentColor" stroke-width="0.6" opacity="0.45"/>

  <!-- ============== Arabic: مدار ==============
