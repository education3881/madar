<!-- Madār · مدار · bilingual wordmark, v0.3 — outlines extracted from real fonts. -->
<!--
  Madār · مدار · bilingual wordmark, v0.3
  ----------------------------------------------------------------------
  v0.3 (2026-05-25): Glyph outlines extracted directly from the open-source
  Newsreader (Latin, Google Fonts, SIL OFL) and Amiri (Arabic Naskh,
  Google Fonts, SIL OFL) font files using fontTools. The marks ARE the
  typefaces, not hand-drafted approximations of them.

  The macron over the second a and the alif-madda over the alif are drawn
  as deliberately strengthened slabs on top of the extracted outlines —
  the brand's smallest repeatable typographic event. Both slabs sit at
  the same y-coordinate so the two scripts share a single horizontal reading.

  Arabic shaping for مدار:
    م → initial form (U+FEE3) — connects left to dal
    د → final form  (U+FEAA) — receives mim from its right
    ا → isolated   (U+FE8D)  — dal does not join left
    ر → isolated   (U+FEAD)  — alif does not join left

  Layout: viewBox 520×120. Latin run starts at x=110, Arabic run ends
  at x=410. The two scripts are visually balanced around a hairline at
  x=300. Equal optical weight, equal baseline at y=92.
  ----------------------------------------------------------------------
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 520 120"
     role="img"
     aria-label="Madār — مدار"
     preserveAspectRatio="xMidYMid meet"
     fill="currentColor">

